services:
  configurator:
    image: frappe/erpnext:v15
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - SOCKETIO_PORT=9000
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        printf "frappe\nerpnext\n" > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;

  create-site:
    image: frappe/erpnext:v15
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    environment:
      - FRAPPE_SITE_NAME=${FRAPPE_SITE_NAME:-cosmo.localhost}
      - DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - FRAPPE_ADMIN_PASSWORD=${FRAPPE_ADMIN_PASSWORD}
    depends_on:
      configurator:
        condition: service_completed_successfully
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        LOG=/home/frappe/frappe-bench/sites/create-site.log
        echo "=== START ===" > $$LOG
        echo "--- ls apps/cosmo_erp (debug mount) ---" >> $$LOG
        ls -la /home/frappe/frappe-bench/apps/cosmo_erp >> $$LOG 2>&1
        echo "pip install cosmo_erp..." >> $$LOG
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp >> $$LOG 2>&1
        PIP_STATUS=$$?
        echo "pip exit=$$PIP_STATUS" >> $$LOG
        if [ $$PIP_STATUS -ne 0 ]; then
          echo "=== pip install FAILED, aborting (was silently ignored before) ===" >> $$LOG
          cat $$LOG
          exit $$PIP_STATUS
        fi
        grep -qF "cosmo_erp" sites/apps.txt || echo "cosmo_erp" >> sites/apps.txt
        echo "site=$$FRAPPE_SITE_NAME" >> $$LOG
        if [ ! -f /home/frappe/frappe-bench/sites/$$FRAPPE_SITE_NAME/site_config.json ]; then
          echo "--- bench new-site ---" >> $$LOG
          bench new-site $$FRAPPE_SITE_NAME \
            --db-root-password "$$DB_ROOT_PASSWORD" \
            --admin-password "$$FRAPPE_ADMIN_PASSWORD" \
            --install-app erpnext \
            --install-app cosmo_erp >> $$LOG 2>&1
          STATUS=$$?
          echo "exit=$$STATUS" >> $$LOG
          if [ $$STATUS -eq 0 ]; then
            grep -qF "cosmo_erp" sites/apps.txt || echo "cosmo_erp" >> sites/apps.txt
          else
            echo "=== create-site FAILED, dumping $$LOG to container output for Coolify/docker logs ==="
            cat $$LOG
          fi
          exit $$STATUS
        else
          echo "Site exists, skipping." >> $$LOG
          grep -qF "cosmo_erp" sites/apps.txt || echo "cosmo_erp" >> sites/apps.txt
        fi

  # One-shot : rejoue `bench migrate` à chaque déploiement pour appliquer les
  # patches (cosmo_erp.patches.*) qui, sinon, ne s'appliquent jamais après la
  # création initiale du site. Le backend n'est servi qu'une fois ce service OK.
  migrate:
    image: frappe/erpnext:v15
    restart: "no"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    environment:
      - FRAPPE_SITE_NAME=${FRAPPE_SITE_NAME:-cosmo.localhost}
    depends_on:
      create-site:
        condition: service_completed_successfully
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        LOG=/home/frappe/frappe-bench/sites/migrate.log
        echo "=== START migrate $$(date -u) ===" > $$LOG
        echo "--- ls apps/cosmo_erp (debug mount) ---" >> $$LOG
        ls -la /home/frappe/frappe-bench/apps/cosmo_erp >> $$LOG 2>&1
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp >> $$LOG 2>&1
        PIP_STATUS=$$?
        echo "pip exit=$$PIP_STATUS" >> $$LOG
        if [ $$PIP_STATUS -ne 0 ]; then
          echo "=== pip install FAILED, aborting before bench migrate (was silently ignored before) ===" >> $$LOG
          cat $$LOG
          exit $$PIP_STATUS
        fi
        echo "--- bench migrate site=$$FRAPPE_SITE_NAME ---" >> $$LOG
        bench --site $$FRAPPE_SITE_NAME migrate >> $$LOG 2>&1
        STATUS=$$?
        echo "migrate exit=$$STATUS" >> $$LOG
        if [ $$STATUS -ne 0 ]; then
          echo "=== migrate FAILED, dumping $$LOG to container output for Coolify/docker logs ==="
          cat $$LOG
        fi
        exit $$STATUS

  backend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - SOCKETIO_PORT=9000
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp
        exec /home/frappe/frappe-bench/env/bin/gunicorn \
          --chdir=/home/frappe/frappe-bench/sites \
          --bind=0.0.0.0:8000 \
          frappe.app:application \
          --workers=2 \
          --timeout=120 \
          --preload

  frontend:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: nginx-entrypoint.sh
    environment:
      - BACKEND=backend:8000
      - SOCKETIO=websocket:9000
      - UPSTREAM_REAL_IP_ADDRESS=127.0.0.1
      - FRAPPE_SITE_NAME_HEADER=${FRAPPE_SITE_NAME:-cosmo.localhost}
      - PROXY_READ_TIMEOUT=120
      - CLIENT_MAX_BODY_SIZE=50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "8081:8080"
    depends_on: [backend]
    networks: [cosmo-net]

  websocket:
    image: frappe/erpnext:v15
    restart: unless-stopped
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    depends_on: [backend]
    networks: [cosmo-net]

  scheduler:
    image: frappe/erpnext:v15
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    depends_on: [backend]
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp
        exec bench schedule

  worker-short:
    image: frappe/erpnext:v15
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    depends_on: [backend]
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp
        exec bench worker --queue short,default

  worker-long:
    image: frappe/erpnext:v15
    restart: unless-stopped
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - ./cosmo_erp:/home/frappe/frappe-bench/apps/cosmo_erp
    depends_on: [backend]
    networks: [cosmo-net]
    entrypoint:
      - bash
      - -c
    command:
      - |
        /home/frappe/frappe-bench/env/bin/pip install -q --no-deps -e /home/frappe/frappe-bench/apps/cosmo_erp
        exec bench worker --queue long

  db:
    image: mariadb:10.6
    restart: unless-stopped
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME:-_cosmo}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    networks: [cosmo-net]

  redis-cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis-cache-data:/data]
    networks: [cosmo-net]

  redis-queue:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: [redis-queue-data:/data]
    networks: [cosmo-net]

  cosmo-mcp:
    build:
      context: ./cosmo-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ERPNEXT_URL=http://frontend:8080
      - ERPNEXT_API_KEY=${COSMO_MCP_API_KEY}
      - ERPNEXT_API_SECRET=${COSMO_MCP_API_SECRET}
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=3100
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes: [cosmo-mcp-logs:/var/log/cosmo-mcp]
    ports: ["3100:3100"]
    depends_on: [frontend]
    networks: [cosmo-net]

  # Hermes Agent tourne sur Hostinger (serveur externe)
  # Il se connecte à cosmo-mcp via http://95.216.187.73:3100

volumes:
  sites:
  logs:
  db-data:
  redis-cache-data:
  redis-queue-data:
  cosmo-mcp-logs:

networks:
  cosmo-net:
    driver: bridge
